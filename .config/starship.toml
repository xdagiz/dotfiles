"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$username\
$hostname\
$directory\
$custom\
$cmd_duration\
$c\
$rust\
$golang\
$nodejs\
$python\
$line_break\
$character"""

[custom.jj]
when = "jj-starship detect"
shell = ["jj-starship"]
format = "$output "

[directory]
style = "blue"

[character]
success_symbol = "[ÔØ»](purple)"
error_symbol = "[ÔØ»](red)"
vimcmd_symbol = "[ÔØ«](green)"

[os]
disabled = false
format = "[$symbol ]($style)"

[os.symbols]
