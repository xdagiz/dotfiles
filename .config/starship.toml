[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(* $conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed) ]($style)"
style = "cyan"
conflicted = "$count= "
untracked = "$count? "
modified = "$count! "
staged = "$count+ "
renamed = "$count┬╗ "
