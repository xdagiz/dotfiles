music_directory    "~/Music"
playlist_directory "~/.config/mpd/playlists"
restore_paused "yes"
bind_to_address "127.0.0.1"
port "6601"

audio_output {
    type        "pulse"
    name        "PipeWire Output"
    mixer_type  "software"
}

audio_output {
    type "fifo"
    name "Visualizer"
    path "/tmp/mpd.fifo"
    format "44100:16:2"
}
