# reload config
bind=SUPER,r,spawn_shell,bash ~/.config/mango/scripts/config_check.sh
bind=SUPER+SHIFT,r,reload_config

# menu and terminal
bind=SUPER,Return,spawn,alacritty
bind=ALT,space,spawn,rofi -show drun
# bind=Alt,space,spawn,fuzzel
bind=SUPER,d,spawn,rofi -show run
bind=SUPER,ALT,l,spawn swaylock
bind=SUPER,p,spawn_shell,cliphist list | rofi -dmenu -p '' | cliphist decode | wl-copy
bind=SUPER,e,spawn,nautilus

# bind=SUPER,code:58,quit
bind=SUPER+SHIFT,e,quit
# killclient super+q
# bind=ALT,code:24,killclient,
bind=SUPER,q,killclient,

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=SUPER,u,focuslast
bind=SUPER,l,focusdir,left
bind=SUPER,h,focusdir,right
bind=SUPER,j,focusdir,up
bind=SUPER,k,focusdir,down

# swap window
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right

# movewin
bind=CTRL+SUPER,k,movewin,+0,-50
bind=CTRL+SUPER,j,movewin,+0,+50
bind=CTRL+SUPER,h,movewin,-50,+0
bind=CTRL+SUPER,l,movewin,+50,+0

# resizewin
bind=CTRL+ALT,k,resizewin,+0,-50
bind=CTRL+ALT,j,resizewin,+0,+50
bind=CTRL+ALT,h,resizewin,-50,+0
bind=CTRL+ALT,l,resizewin,+50,+0

# switch window status
bind=SUPER,g,toggleglobal,
bind=SUPER,o,toggleoverview,0
bind=SUPER,v,togglefloating,
bind=SUPER,f,togglemaximizescreen,
bind=SUPER+SHIFT,f,togglefullscreen,
bind=SUPER+ALT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER+SHIFT,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# scroller layout
bind=SUPER,e,set_proportion,1.0
bind=SUPER,x,switch_proportion_preset,

# tile layout
bind=SUPER+ALT,e,incnmaster,1
# bind=SUPER,t,incnmaster,-1
# bind=SUPER,s,zoom

bind=SUPER,t,setlayout,tile
bind=SUPER+SHIFT,v,setlayout,vertical_grid
bind=SUPER,c,setlayout,spiral
bind=SUPER,s,setlayout,scroller
bind=SUPER,a,togglegaps
bind=SUPER,n,switch_layout

# tag switch
bind=SUPER,Left,viewtoleft_have_client,0
bind=SUPER,Right,viewtoright_have_client,0
bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0

bind=SUPER,1,comboview,1,0
bind=SUPER,2,comboview,2,0
bind=SUPER,3,comboview,3,0
bind=SUPER,4,comboview,4,0
bind=SUPER,5,comboview,5,0
bind=SUPER,7,comboview,1,0
bind=SUPER,8,comboview,2,0
bind=SUPER,9,comboview,3,0
bind=SUPER,0,comboview,4,0

bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0

bind=ctrl+Super,1,toggletag,1
bind=ctrl+Super,2,toggletag,2
bind=ctrl+Super,3,toggletag,3
bind=ctrl+Super,4,toggletag,4
bind=ctrl+Super,5,toggletag,5

bind=CTRL+SHIFT,k,smartmovewin,up
bind=CTRL+SHIFT,j,smartmovewin,down
bind=CTRL+SHIFT,h,smartmovewin,left
bind=CTRL+SHIFT,l,smartmovewin,right

# switch window focus
bind=SUPER,j,focusstack,next
bind=SUPER,k,focusstack,prev
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right

# swap window
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right

# monitor switch
# bind=alt+shift,Left,focusmon,left
# bind=alt+shift,Right,focusmon,right
# bind=alt+shift,Up,focusmon,up
# bind=alt+shift,Down,focusmon,down
# bind=SUPER+Alt,Left,tagmon,left
# bind=SUPER+Alt,Right,tagmon,right
# bind=SUPER+Alt,Up,tagmon,up
# bind=SUPER+Alt,Down,tagmon,down

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
# bind=ALT+SHIFT,R,togglegaps


# Mouse Button Bindings
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=alt,btn_middle,set_proportion,0.5
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=SUPER+CTRL,btn_left,minimized
mousebind=SUPER+CTRL,btn_right,killclient
mousebind=SUPER+CTRL,btn_middle,togglefullscreen
mousebind=NONE,btn_middle,togglemaximizescreen,0

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client
axisbind=alt,UP,focusdir,left
axisbind=alt,DOWN,focusdir,right
axisbind=shift+super,UP,exchange_client,left
axisbind=shift+super,DOWN,exchange_client,right

# Gesturebind
# gesturebind=none,left,3,focusdir,left
# gesturebind=none,right,3,focusdir,right
# gesturebind=none,up,3,focusdir,up
# gesturebind=none,down,3,focusdir,down
# gesturebind=none,left,4,viewtoleft_have_client
# gesturebind=none,right,4,viewtoright_have_client
# gesturebind=none,up,4,toggleoverview,1
# gesturebind=none,down,4,toggleoverview,1

bind=none,XF86MonBrightnessUp,spawn,~/.config/mango/scripts/brightness.sh up
bind=none,XF86MonBrightnessDown,spawn,~/.config/mango/scripts/brightness.sh down

#custom app bind
bind=CTRL+ALT,a,spawn_shell,grim -g "$(slurp -b '#2E2A1E55' -c '#fb751bff')" -t ppm - | satty -f -
bind=SUPER+ALT,h,spawn,bash ~/.config/mango/scripts/hide_waybar_mango.sh
# bind=SUPER+SHIFT,l,spawn,swaylock -f -c 000000
bind=CTRL+ALT,backslash,spawn,swaync-client -t
bind=CTRL+ALT,BackSpace,spawn,swaync-client -C
# bind=SUPER,p,spawn,bash ~/.config/mango/scripts/monitor.sh
bind=SUPER+SHIFT,p,spawn,bash ~/.config/mango/scripts/virmon.sh

# namescrtachpad
# bind=ctrl+super,h,toggle_named_scratchpad,st-yazi,none,st -c st-yazi -e yazi
# windowrule=isnamedscratchpad:1,width:1280,height:800,appid:st-yazi

bind=none,XF86AudioPlay,spawn,playerctl play-pause
bind=none,XF86AudioStop,spawn,playerctl stop
bind=none,XF86AudioPrev,spawn,playerctl previous
bind=none,XF86AudioNext,spawn,playerctl next
bind=none,XF86AudioRaiseVolume,spawn,~/.config/scripts/volume.sh up
bind=none,XF86AudioLowerVolume,spawn_shell,~/.config/scripts/volume.sh down
bind=none,XF86AudioMute,spawn_shell,~/.config/scripts/volume.sh mute
bind=none,F7,spawn,playerctl previous
bind=none,F8,spawn,playerctl next

bind=SUPER+SHIFT,s,spawn_shell,grimshot copy area && notify-send "Screenshot copied!"
bind=SUPER+SHIFT,c,spawn_shell,hyprpicker -a
bind=none,Print,spawn_shell,grim ~/Pictures/Screenshots/$(date +%F_%H-%M-%S).png && notify-send "Screenshot Saved"
